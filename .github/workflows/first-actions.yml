name: my first github actions project

on: [push] 

jobs:
  build: 
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.14", "3.13"]

    steps:
    - name: checkout repository
      uses: actions/checkout@v4

    - name: set up python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
